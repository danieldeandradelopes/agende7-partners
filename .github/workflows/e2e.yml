name: E2E Cypress

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-mock:
    name: E2E (mock API)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Cache Cypress binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-cypress-14-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            cypress-${{ runner.os }}-cypress-14-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cypress
        run: pnpm exec cypress verify

      - name: Run E2E (sem backend)
        run: pnpm test:e2e:mock
        env:
          CYPRESS_USE_MOCKS: "true"
          ELECTRON_RUN_AS_NODE: ""

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-partners
          path: cypress/screenshots
          if-no-files-found: ignore
          retention-days: 7
