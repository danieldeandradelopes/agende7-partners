name: E2E Cypress

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: |
            agende7-partners/pnpm-lock.yaml
            agende7-backend/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          pnpm install --dir agende7-backend
          pnpm install --dir agende7-partners

      - name: Start Postgres and seed
        working-directory: agende7-backend
        run: |
          docker compose up -d postgres
          sleep 5
          pnpm migration:run
          pnpm seed:master

      - name: Run E2E
        working-directory: agende7-partners
        run: pnpm test:e2e

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-partners
          path: |
            agende7-partners/cypress/screenshots
            agende7-partners/cypress/videos
          if-no-files-found: ignore
